<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skillify | New Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="indexcss.css">
    <link rel="stylesheet" href="logincss.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .auth-container { width: 450px; min-height: 400px; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        .form-container { width: 100%; position: relative; }
        .auth-container form { padding: 0; background: transparent; height: auto; }
        .auth-title { margin-bottom: 20px; font-size: 28px; }
    </style>
</head>
<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="form-container">
                <form id="newPasswordForm">
                    <h1 class="auth-title">New Password</h1>
                    <span style="margin-bottom: 30px; display: block;">Enter your new secure password below</span>
                    <div class="input-group" style="margin-bottom: 25px;">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="newPassword" placeholder="New Password (min 6 chars)" required minlength="6"/>
                    </div>
                    <button type="submit" class="btn auth-btn" style="width: 100%;">Update Password</button>
                    <p class="error-msg" id="updateError" style="margin-top: 20px; font-size: 14px; font-weight: 500;"></p>
                    <a href="login.html" class="forgot-pass" style="margin-top: 30px; display: inline-block;">Back to Login</a>
                </form>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.getElementById('newPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const password = document.getElementById('newPassword').value;
            const errorMsg = document.getElementById('updateError');
            
            // Extract token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (!token) {
                errorMsg.style.color = "var(--danger)";
                errorMsg.innerText = "Invalid or missing token!";
                return;
            }

            errorMsg.innerText = "Updating password...";
            errorMsg.style.color = "var(--text-secondary)";

            try {
                const response = await fetch(`${API_BASE}/api/auth/resetpassword/${token}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await response.json();
                if (response.ok && data.success) {
                    errorMsg.style.color = "var(--success)";
                    errorMsg.innerText = "Password updated! Redirecting to login...";
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorMsg.style.color = "var(--danger)";
                    errorMsg.innerText = data.message || "Failed to update password.";
                }
            } catch (err) {
                errorMsg.style.color = "var(--danger)";
                errorMsg.innerText = "An error occurred. Please try again later.";
            }
        });
    </script>
</body>
</html>
